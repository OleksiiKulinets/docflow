<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../sass/main.css">
  <title>Doc Editor</title>
</head>

<body>

<header class="topbar">
  <div class="brand">DocFlow Editor</div>

  <div class="topbar-actions">
    <button class="btn">Save</button>
    <button class="btn btn-primary">Export</button>
  </div>
</header>

<div class="layout">

  <aside class="settings">

    <!-- FILE UPLOAD -->
    <label class="upload-box">
      <div class="upload-title">Upload document</div>
      <div class="upload-sub">DOCX, TXT, PDF (mock UI)</div>
      <input type="file">
    </label>

    <div class="panel-title">Settings</div>

    <div class="group">
      <label>Font size</label>
      <input type="range" min="10" max="40">
    </div>

    <div class="group">
      <label>Font family</label>
      <select>
        <option>Inter</option>
        <option>Arial</option>
        <option>Times New Roman</option>
      </select>
    </div>

    <div class="group">
      <label>Line spacing</label>
      <input type="number" value="1.5" step="0.1">
    </div>

    <button class="btn full">Apply changes</button>

  </aside>

  <div class="divider"></div>

  <main class="preview">
    <div class="document">
      <h1>Document title</h1>
      <p>Upload a file or start editing manually.</p>
    </div>
  </main>

</div>

<footer class="footer">
  <span>Ready</span>
</footer>

</body>
</html>
